<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{ page.title }} | DERECHO.NET.AR</title>

<style>

:root{
--color-principal:#2c5363;
--color-fondo:#f4f6f8;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui, Arial;
}

body{
background:var(--color-fondo);
color:#333;
}

/* HEADER */

header{
background:var(--color-principal);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:28px;
}

.logo span{
font-size:20px;
font-weight:bold;
}

.logo small{
font-size:12px;
opacity:.7;
}

/* CONTENT */

.container{
max-width:1000px;
margin:auto;
padding:30px;
background:white;
}

h1{
color:var(--color-principal);
margin-bottom:15px;
}

p{
line-height:1.6;
margin-bottom:15px;
}

/* FOOTER */

footer{
margin-top:40px;
background:var(--color-principal);
color:white;
text-align:center;
padding:20px;
font-size:14px;
}

.breadcrumbs{
font-size:14px;
margin-bottom:18px;
display:flex;
align-items:center;
gap:6px;
flex-wrap:wrap;
}

.breadcrumbs a{
text-decoration:none;
color:#2c5363;
}

.breadcrumbs span{
color:#555;
}

.breadcrumbs .sep{
color:#999;
user-select:none;
}

/* CONTENIDO DE ARTICULO */

.wiki-content{
max-width:760px;
margin:auto;
font-size:16px;
line-height:1.7;
color:#222;
}

/* TITULO PRINCIPAL */

.wiki-content h1{
font-size:34px;
margin-bottom:10px;
color:#2c5363;
}

/* SUBTITULOS */

.wiki-content h2{
font-size:24px;
margin-top:35px;
margin-bottom:10px;
padding-bottom:6px;
border-bottom:1px solid #e3e3e3;
color:#2c5363;
}

.wiki-content h3{
font-size:19px;
margin-top:25px;
margin-bottom:8px;
}

/* PARRAFOS */

.wiki-content p{
margin-bottom:16px;
}

/* LISTAS */

.wiki-content ul{
margin:10px 0 18px 20px;
}

.wiki-content li{
margin-bottom:6px;
}

/* NEGRITA */

.wiki-content strong{
font-weight:600;
}

/* LINKS */

.wiki-content a{
color:#2c5363;
text-decoration:none;
}

.wiki-content a:hover{
text-decoration:underline;
}

/* TABLA DE CONTENIDOS */

#toc{
background:#f8f9fa;
border:1px solid #ddd;
padding:15px;
border-radius:6px;
margin:20px 0;
}

#toc h3{
margin-top:0;
font-size:16px;
}

#toc ul{
margin:10px 0 0 18px;
}

/* MOBILE */

@media(max-width:800px){

.wiki-content{
padding:0 15px;
font-size:15px;
}

.wiki-content h1{
font-size:26px;
}

.wiki-content h2{
font-size:21px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="https://blogger.googleusercontent.com/img/a/AVvXsEh9hfcZJh1XSfbFJ739F6t085dpoR2I63ad3f3DzJ5Pqd4AAyLrXPdKvw3DVCB7v6XpsBybvVOqx7a1BW6tAAFHKPLmW1g4jy7jBArQhEChr9ETMa9ZBfhx71LZ6UtmOmkR7kkW6tnIsZdZcdWbmqJzpujWT6nVcmGUvqa_3uRk0lzeRHhssSrTebv0L64=s16000">

<span>Wiki | Derecho<small>.net.ar</small></span>

</div>

</header>

<div class="container">

<h1>{{ page.title }}</h1>

<nav class="breadcrumbs">

<a href="/">Inicio</a>

{% if page.categoria %}
<span class="sep">›</span>
<a href="/{{ page.categoria }}/">{{ page.categoria_nombre }}</a>
{% endif %}

<span class="sep">›</span>
<span>{{ page.title }}</span>

</nav>

<div id="toc"></div>

<article class="wiki-content">

{{ content }}

</article>

</div>

<footer>

© 2026 derecho.net.ar — Enciclopedia Jurídica

</footer>

<script>

const headings = document.querySelectorAll("h2, h3");

const toc = document.getElementById("toc");

if(toc){

let tocHTML = "<h3>Contenido</h3><ul>";

headings.forEach(function(h,i){

let id = "section"+i;

h.id = id;

tocHTML += `<li><a href="#${id}">${h.innerText}</a></li>`;

});

tocHTML += "</ul>";

toc.innerHTML = tocHTML;

}

</script>
</body>
</html>
