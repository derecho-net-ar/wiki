<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{ page.title }} | DERECHO.NET.AR</title>

<style>

:root{
--color-principal:#2c5363;
--color-fondo:#f4f6f8;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui, Arial;
}

body{
background:var(--color-fondo);
color:#333;
}

/* HEADER */

header{
background:var(--color-principal);
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:28px;
}

.logo span{
font-size:20px;
font-weight:bold;
}

.logo small{
font-size:12px;
opacity:.7;
}

/* CONTENT */

.container{
max-width:1000px;
margin:auto;
padding:30px;
background:white;
}

h1{
color:var(--color-principal);
margin-bottom:15px;
}

p{
line-height:1.6;
margin-bottom:15px;
}

/* FOOTER */

footer{
margin-top:40px;
background:var(--color-principal);
color:white;
text-align:center;
padding:20px;
font-size:14px;
}

.breadcrumbs{
font-size:14px;
margin-bottom:18px;
}

.breadcrumbs a{
text-decoration:none;
color:#2c5363;
}

.breadcrumbs span{
color:#666;
}

.breadcrumbs a + a::before,
.breadcrumbs span::before{
content:" › ";
color:#999;
}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="https://blogger.googleusercontent.com/img/a/AVvXsEh9hfcZJh1XSfbFJ739F6t085dpoR2I63ad3f3DzJ5Pqd4AAyLrXPdKvw3DVCB7v6XpsBybvVOqx7a1BW6tAAFHKPLmW1g4jy7jBArQhEChr9ETMa9ZBfhx71LZ6UtmOmkR7kkW6tnIsZdZcdWbmqJzpujWT6nVcmGUvqa_3uRk0lzeRHhssSrTebv0L64=s16000">

<span>Wiki | Derecho<small>.net.ar</small></span>

</div>

</header>

<div class="container">

<h1>{{ page.title }}</h1>

<nav class="breadcrumbs">

<a href="/">Inicio</a>
<a href="/{{ page.categoria }}/">{{ page.categoria_nombre }}</a>
<span>{{ page.title }}</span>

</nav>

<div id="toc"></div>

{{ content }}

</div>

<footer>

© 2026 derecho.net.ar — Enciclopedia Jurídica

</footer>

<script>

const headings = document.querySelectorAll("h2, h3");

const toc = document.getElementById("toc");

if(toc){

let tocHTML = "<h3>Contenido</h3><ul>";

headings.forEach(function(h,i){

let id = "section"+i;

h.id = id;

tocHTML += `<li><a href="#${id}">${h.innerText}</a></li>`;

});

tocHTML += "</ul>";

toc.innerHTML = tocHTML;

}

</script>
</body>
</html>
